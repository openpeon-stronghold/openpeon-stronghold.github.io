<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}" />
  <!-- Open Graph -->
  <meta property="og:type"         content="website" />
  <meta property="og:url"          content="{{ site.url }}/" />
  <meta property="og:title"        content="{{ site.title }}" />
  <meta property="og:description"  content="{{ site.description }}" />
  <meta property="og:image"        content="{{ site.url }}/assets/images/open-graph.webp" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <!-- Twitter / X -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="{{ site.title }}" />
  <meta name="twitter:description" content="{{ site.description }}" />
  <meta name="twitter:image"       content="{{ site.url }}/assets/images/open-graph.webp" />
  <link id="favicon" rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVQI12NgAAIABQAABjE+ibYAAAAASUVORK5CYII=">
  <link rel="stylesheet" href="{{ relativePathPrefix }}styles/main.min.css">
  {% if livereload_port %}<script src="http://localhost:{{ livereload_port }}/livereload.js"></script>{% endif %}
</head>
<body>

<div id="loading-screen">
  <div class="loading-inner">
    <div class="loading-title">Marshalling the lords&hellip;</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar-fill"></div>
    </div>
  </div>
</div>

{% block content %}{% endblock %}

<div class="beer-bar">
  <a class="beer-btn" href="https://buymeacoffee.com/koyev" target="_blank" rel="noopener" title="Buy me a beer"></a>
</div>

<script src="{{ relativePathPrefix }}scripts/main.min.js" defer></script>
</body>
</html>
